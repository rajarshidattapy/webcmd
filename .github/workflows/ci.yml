name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Check community plugin metadata
        if: runner.os == 'Linux'
        run: npm run check-community-plugins

      - name: Build
        run: npm run build

      - name: Check generated contract artifacts
        if: runner.os == 'Linux'
        run: npm run check:hosted-contract

      - name: Verify packed CLI executables
        run: npm run check:package-bin

      - name: Check silent column drops
        if: runner.os == 'Linux'
        run: npm run check:silent-column-drop

      - name: Check typed error lint baseline
        if: runner.os == 'Linux'
        run: npm run check:typed-error-lint

  unit-test:
    name: Unit tests (${{ matrix.os }}, shard ${{ matrix.shard }}/2)
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run --project unit --reporter=verbose --shard=${{ matrix.shard }}/2

  adapter-test:
    name: Adapter tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run adapter tests
        run: npm run test:adapter -- --reporter=verbose

  bun-test:
    name: Bun compatibility
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests under Bun
        run: bun vitest run --project unit --reporter=verbose

  smoke-test:
    name: Scheduled smoke tests
    needs: build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke tests
        run: npx vitest run --project smoke --reporter=verbose

  windows-cloak-smoke:
    name: Windows real Cloak smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify packed CLI executables
        run: npm run check:package-bin

      - name: Validate diagnostics safety self-test
        shell: pwsh
        run: ./scripts/collect-ci-diagnostics.ps1 -SelfTest

      - name: Run real Cloak lifecycle smoke
        run: npx vitest run --project e2e tests/e2e/cloak-runtime.test.ts

      - name: Collect sanitized diagnostics
        if: failure()
        shell: pwsh
        run: |
          ./scripts/collect-ci-diagnostics.ps1 -SelfTest
          ./scripts/collect-ci-diagnostics.ps1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: windows-cloak-diagnostics
          path: artifacts/windows-cloak/**
